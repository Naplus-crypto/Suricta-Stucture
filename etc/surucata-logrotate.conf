/var/log/suricata/eve.json
# /var/log/suricata/fast.log
{
        hourly
        size 5G
        rotate 48
        missingok
        compress
        dateext
        dateformat -%Y-%m-%d-%H-%M-%S
        copytruncate
        sharedscripts
        postrotate
                /bin/kill -HUP $(cat /var/run/suricata.pid)
        endscript
}

/var/log/suricata/stats.log
/var/log/suricata/suricata.log
{
    daily
    rotate 7
    missingok
    compress
    dateext
    dateformat -%Y-%m-%d
    copytruncate
    sharedscripts
    postrotate
            /bin/kill -HUP $(cat /var/run/suricata.pid)
    endscript
}
